<p-table
  [tableStyle]="{ 'min-width': '50rem' }"
  [value]="PatientManager.listaPZ()"
>
  <ng-template #header>
    <tr>
      <th>ID</th>
      <th>Codice colore</th>
      <th>Anagrafica</th>
      <th>Braccialetto</th>
      <th>Eta</th>
      <th>Patologia</th>
      <th>Note</th>
    </tr>
  </ng-template>

  <ng-template #body let-pz>
    <tr>
      <td>{{ pz.id }}</td>
      <td>{{ pz.codiceColore }}</td>
      <td>{{ pz.cognome }} {{ pz.nome }}</td>
      <td>{{ pz.braccialetto }}</td>
      <td>{{ pz.eta }}</td>
      <td>{{ pz.patologia }}</td>
      <td>{{ pz.note }}</td>
    </tr>
  </ng-template>
</p-table>
