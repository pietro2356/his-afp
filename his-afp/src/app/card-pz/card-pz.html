<div class="mb-4 p-8">
  <p-card class="h-1rem w-full">
    <ng-template #title>
      {{ paziente().cognome }} {{ paziente().nome }}
    </ng-template>

    <ng-template #subtitle>
      {{ paziente().braccialetto }}
    </ng-template>

    <hr>

    <div class="flex flex-col gap-2">
      <div class="font-bold">
        {{ paziente().codiceColore }}
      </div>

      <p>{{ paziente().note }}</p>

      <small>
        Arrivo: {{ paziente().oraArrivo | date:'hh:mm dd/mm/yyyy' }}
      </small>
    </div>
  </p-card>
</div>
