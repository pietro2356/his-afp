<div class="mb-4 p-4">
  <p-card
    class="w-2xs h-auto {{setStatusColor()}}"
    header="{{paziente().cognome}} {{paziente().nome}}"
    subheader="{{paziente().braccialetto}} - {{paziente().codiceColore}}"
  >
    <p>
      <b>{{ paziente().patologia }}</b>
      <br>
      Note Triage: {{ paziente().note }}
    </p>

    <ng-template #footer>
      <p-button (onClick)='incrementaStato()' label="Incrementa" severity="danger"/>
      <p-button (onClick)='decrementaStato()' label="Decrementa" severity="secondary"/>
    </ng-template>
  </p-card>
</div>
