<div hisFlexColP>
  <label for="cognome">{{ scopo() }}</label>
  @switch (type()) {
    @case ('date') {
      <!--      <p-datepicker-->
        <!--        [class.p-invalid]="checkFn()(formField())"-->
        <!--        [formField]="formField()"-->
        <!--        [id]="scopo()"/>-->
    }
    @default {
      <input
        [class.p-invalid]="checkFn()(formField())"
        [formField]="formField()"
        [id]="scopo()"
        [type]="type()"
        pInputText
      />
    }
  }

  @if (checkFn()(formField())) {
    <p-message severity="error" size="small" variant="simple">
      @for (error of formFieldErrors(); track error) {
        <p>{{ error.message }}</p>
      }
    </p-message>
  }
</div>
